name: astrbot_plugin_cell_manager
desc: Cell Manager - 任务管理系统，支持无限递归的父子关系、漂亮的树形可视化和 macOS 风格的时间统计界面，支持自然语言交互
help: |
  📋 Cell Manager 任务管理系统

  【命令方式】
  /cell create <标题> [工作量] - 创建任务
  /cell tree <任务ID> - 显示任务树
  /cell done <任务ID> - 完成任务
  /cell doing <任务ID> - 开始任务
  /cell todo <任务ID> - 重置为待办
  /cell urgent <任务ID> - 标记为紧急
  /cell add <父任务ID> <子任务标题> [工作量] - 添加子任务
  /cell delete <任务ID> - 删除任务
  /cell hours <任务ID> <小时数> - 记录实际用时
  /cell progress [任务ID] - 查看任务进度
  /cell archive <任务ID> - 归档任务
  /cell unarchive <任务ID> - 取消归档
  /cell archive-all - 归档所有已完成任务

  【自然语言方式】
  直接说话即可，例如：
  - "创建一个学习Python的任务，工作量10"
  - "我完成了abc123任务"
  - "显示abc123的任务树"
  - "记录abc123任务花了5小时"
  - "开始执行abc123任务"

  状态图标:
  [ ] 待办  [>] 进行中  [!] 紧急  [X] 已完成

  【Web 可视化界面】
    访问 AstrBot 管理面板即可使用可视化界面

version: v1.3.0
author: Cell Manager Team
repo: https://github.com/mugeeen/cell_manager

# 插件展示名
display_name: Cell Manager 任务管理

# 支持的 AstrBot 版本
astrbot_version: ">=4.0.0"

# 支持的消息平台
support_platforms:
  - aiocqhttp
  - telegram
  - wecom
  - lark
  - dingtalk
  - discord
