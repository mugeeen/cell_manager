                    style: { stroke: '#999' },

                        description: editingNode.description,
                        status: editingNode.status,
                        workload: editingNode.workload,
                        actual_hours: editingNode.actual_hours
                    })

                        setEditModalOpen(false); 
                        loadGraph(); 
                    } 
                });
            };

            const saveCreate = () => {

                // 1. 乐观地先添加到本地状态
                const newNode = {
                    id: tempId,
                    type: 'custom',
                    position: contextMenuPos,
                    data: {
                        id: tempId,
                        label: editingNode.title,
                        title: editingNode.title,
                        description: editingNode.description || '',
                        status: 'todo',
                        color: statusColors['todo'],
                        workload: parseFloat(editingNode.workload) || 0,
                        actual_hours: 0,
                        is_leaf: true,
                        level: createParentId ? (selectedNode?.level || 0) + 1 : 0
                    }
                };
                
                // 如果是子节点，添加边
                if (createParentId) {
                    const newEdge = {
                        id: `edge-${tempId}`,
                        source: createParentId,
                        target: tempId,
                        animated: true,
                        style: { stroke: '#999' }
                    };
                    setEdges(eds => [...eds, newEdge]);
                }

                setCreateModalOpen(false);

                fetch('/api/cells', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        title: editingNode.title, 
                        description: editingNode.description, 
                        parent_id: createParentId, 
                        workload: parseFloat(editingNode.workload) || 0 
                    })

                        setNodes(nds => nds.map(n =>

                                id: result.data.id,
                                data: { ...n.data, id: result.data.id }
                            } : n

                        setEdges(eds => eds.map(e =>

                        // 如果在筛选视图下创建了根节点，更新根节点列表

                        }

                setNodes(nds => nds.filter(n => n.id !== nodeId));

                fetch(`/api/cells/${nodeId}`, {

                }).then(r => r.json()).then(result => {
                    if (!result.success) {
                        // 失败则刷新恢复
                        alert('删除失败: ' + result.message);
                        loadGraph();
                    } else {
                        // 更新根节点列表

                            if (data.success) setRootCells(data.data);

                                    if (result.success) {
                                        alert(`已归档 ${result.archived_count} 个完成的任务`);
                                        loadGraph();
                                    } else {
                                        alert('归档失败: ' + result.message);
