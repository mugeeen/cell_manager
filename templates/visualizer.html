    <script>
        let cy = null;
        
        // هˆ‌ه§‹هŒ?Cytoscape
        function initCytoscape() {
            cy = cytoscape({
                container: document.getElementById('cy'),
                style: [
                    {
                        selector: 'node',
                        style: {
                            'background-color': 'data(color)',
                            'label': 'data(label)',
                            'width': 80,
                            'height': 80,
                            'font-size': '12px',
                            'text-valign': 'center',
                            'text-halign': 'center',
                            'text-wrap': 'wrap',
                            'text-max-width': '70px',
                            'color': '#fff',
                            'border-width': 3,
                            'border-color': '#fff'
                        }
                    },
                    {
                        selector: 'edge',
                        style: {
                            'width': 2,
                            'line-color': '#ccc',
                            'target-arrow-color': '#ccc',
                            'target-arrow-shape': 'triangle',
                            'curve-style': 'bezier'
                        }
                    },
                    {
                        selector: ':selected',
                        style: {
                            'border-width': 4,
                            'border-color': '#2196f3'
                        }
                    }
                ],
                layout: {
                    name: 'breadthfirst',
                    directed: true,
                    nodeSep: 50,
                    rankSep: 80
                },
                minZoom: 0.3,
                maxZoom: 2
            });
            
            // هگ¯ç”¨èٹ‚ç‚¹و‹–و‹½
            cy.nodes().grabify();
            
            // ç‚¹ه‡»èٹ‚ç‚¹وک¾ç¤؛è¯¦وƒ…
            cy.on('tap', 'node', function(evt) {
                const node = evt.target;
                showNodeDetail(node.data());
            });
            
            // هڈŒه‡»èٹ‚ç‚¹و‰“ه¼€ç¼–è¾‘
            cy.on('dbltap', 'node', function(evt) {
                const node = evt.target;
                openEditModal(node.data());
            });
            
            // ç‚¹ه‡»ç©؛ç™½ه¤„éڑگè—ڈè¯¦وƒ?
            cy.on('tap', function(evt) {
                if (evt.target === cy) {
                    hideNodeDetail();
                }
            });
            
            // هڈ³é”®ç‚¹ه‡»èٹ‚ç‚¹ - وک¾ç¤؛ن¸ٹن¸‹و–‡èڈœهچ?
            cy.on('cxttap', 'node', function(evt) {
                evt.preventDefault();
                const node = evt.target;
                const renderedPosition = node.renderedPosition();
                showContextMenu(renderedPosition.x, renderedPosition.y, node);
            });
            
            // هڈ³é”®ç‚¹ه‡»ç©؛ç™½ه¤?- وک¾ç¤؛هˆ›ه»؛و ¹èٹ‚ç‚¹èڈœهچ?
            cy.on('cxttap', function(evt) {
                if (evt.target === cy) {
                    evt.preventDefault();
                    const renderedPosition = evt.renderedPosition;
                    showContextMenu(renderedPosition.x, renderedPosition.y, null);
                }
            });
            
            // ==================== و‹–و‹½è؟‍ç؛؟هٹںèƒ½ (Alt+و‹–و‹½) ====================
            let dragSourceNode = null;
            let dragLine = null;
            let isDragging = false;
            let isAltPressed = false;
            
            // ç›‘هگ¬é”®ç›کن؛‹ن»¶
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Alt') {
                    isAltPressed = true;
                }
            });
            
            document.addEventListener('keyup', function(e) {
                if (e.key === 'Alt') {
                    isAltPressed = false;
                }
            });
            
            // ه¼€ه§‹و‹–و‹½è؟‍ç؛؟ï¼ˆوŒ‰ن½ڈ Alt هœ¨èٹ‚ç‚¹ن¸ٹوŒ‰ن¸‹é¼ و ‡ï¼?
            cy.on('mousedown', 'node', function(evt) {
                // و£€وں¥وک¯هگ¦وک¯ه·¦é”®ن¸”وŒ‰ن½?Alt
                if (evt.originalEvent && evt.originalEvent.button !== 0) {
                    return;
                }
                if (!isAltPressed) {
                    return; // و²،وœ‰وŒ‰ن½ڈ Altï¼Œن¸چهگ¯هٹ¨è؟‍ç؛؟و¨،ه¼ڈ
                }
                
                // éک»و­¢é»کè®¤و‹–و‹½è،Œن¸؛
                evt.preventDefault();
                
                const node = evt.target;
                dragSourceNode = node;
                isDragging = true;
                
                // ن¸´و—¶ç¦پç”¨èٹ‚ç‚¹و‹–و‹½
                cy.nodes().ungrabify();
                
                const nodePos = node.position();
                
                // هˆ›ه»؛ن¸´و—¶èµ·ç‚¹èٹ‚ç‚¹ï¼ˆهœ¨èٹ‚ç‚¹ن¸­ه؟ƒï¼?
                let tempStartNode = cy.getElementById('temp-start-node');
                if (tempStartNode.length > 0) {
                    tempStartNode.remove();
                }
                tempStartNode = cy.add({
                    group: 'nodes',
                    data: { id: 'temp-start-node' },
                    position: { x: nodePos.x, y: nodePos.y },
                    style: {
                        'opacity': 0,
                        'width': 1,
                        'height': 1
                    }
                });
                
                // هˆ›ه»؛و‹–و‹½ç؛?
                dragLine = cy.add({
                    group: 'edges',
                    data: {
                        id: 'drag-line-temp',
                        source: 'temp-start-node',
                        target: 'temp-start-node'
                    },
                    style: {
                        'line-color': '#2196f3',
                        'target-arrow-color': '#2196f3',
                        'line-style': 'dashed',
                        'width': 3,
                        'arrow-scale': 1.5
                    }
                });
            });
            
            // و‹–و‹½ن¸­ï¼ˆé¼ و ‡ç§»هٹ¨ï¼?
            cy.on('mousemove', function(evt) {
                if (!isDragging || !dragLine) return;
                
                // و›´و–°و‹–و‹½ç؛؟çڑ„ç»ˆç‚¹هˆ°é¼ و ‡ن½چç½?
                const pos = evt.position;
                const tempNodeId = 'temp-target-node';
                let tempNode = cy.getElementById(tempNodeId);
                
                if (tempNode.length === 0) {
                    tempNode = cy.add({
                        group: 'nodes',
                        data: { id: tempNodeId },
                        position: pos,
                        style: {
                            'opacity': 0,
                            'width': 1,
                            'height': 1
                        }
                    });
                } else {
                    tempNode.position(pos);
                }
                
                dragLine.data('target', tempNodeId);
                
                // é«کن؛®é¼ و ‡ن¸‹و–¹çڑ„èٹ‚ç‚?
                cy.nodes().forEach(node => {
                    if (node.id() !== dragSourceNode.id() &&
                        node.id() !== 'temp-target-node' &&
                        node.id() !== 'temp-start-node') {
                        const nodePos = node.position();
                        const distance = Math.sqrt(
                            Math.pow(nodePos.x - pos.x, 2) +
                            Math.pow(nodePos.y - pos.y, 2)
                        );
                        
                        if (distance < 50) {
                            node.style('border-width', 4);
                            node.style('border-color', '#2196f3');
                        } else {
                            node.style('border-width', 2);
                            node.style('border-color', '#fff');
                        }
                    }
                });
            });
            
            // ç»“و‌ںو‹–و‹½ï¼ˆé¼ و ‡é‡ٹو”¾ï¼‰
            cy.on('mouseup', function(evt) {
                if (!isDragging || !dragSourceNode || !dragLine) {
                    return;
                }
                
                const mousePos = evt.position;
                
                // و¸…çگ†ن¸´و—¶ه…ƒç´ 
                const tempStartNode = cy.getElementById('temp-start-node');
                const tempTargetNode = cy.getElementById('temp-target-node');
                
                if (tempStartNode.length > 0) tempStartNode.remove();
                if (tempTargetNode.length > 0) tempTargetNode.remove();
                
                // وں¥و‰¾é¼ و ‡ن½چç½®ن¸‹çڑ„ç›®و ‡èٹ‚ç‚¹
                let targetNode = null;
                cy.nodes().forEach(node => {
                    if (node.id() !== dragSourceNode.id() &&
                        node.id() !== 'temp-target-node' &&
                        node.id() !== 'temp-start-node') {
                        const nodePos = node.position();
                        const distance = Math.sqrt(
                            Math.pow(nodePos.x - mousePos.x, 2) +
                            Math.pow(nodePos.y - mousePos.y, 2)
                        );
                        if (distance < 50) {
                            targetNode = node;
                        }
                    }
                });
                
                // ه¦‚و‍œو‰¾هˆ°ç›®و ‡èٹ‚ç‚¹ï¼Œه»؛ç«‹ه…³ç³?
                if (targetNode) {
                    // و£€وں¥وک¯هگ¦ه·²ç»ڈوک¯çˆ¶ه­گه…³ç³»
                    const existingEdge = cy.edges().filter(edge => {
                        return edge.data('source') === dragSourceNode.id() &&
                               edge.data('target') === targetNode.id();
                    });
                    
                    if (existingEdge.length === 0) {
                        moveCellToParent(dragSourceNode.id(), targetNode.id());
                    }
                }
                
                // و¸…çگ†
                dragLine.remove();
                dragSourceNode = null;
                dragLine = null;
                isDragging = false;
                
                // وپ¢ه¤چèٹ‚ç‚¹و‹–و‹½
                cy.nodes().grabify();
                
                // é‡چç½®و‰€وœ‰èٹ‚ç‚¹è¾¹و،?
                cy.nodes().forEach(node => {
                    node.style('border-width', 2);
                    node.style('border-color', '#fff');
                });
            });
            
            // é¼ و ‡ç¦»ه¼€ç”»ه¸ƒو—¶و¸…çگ?
            cy.on('mouseout', function(evt) {
                if (isDragging && dragSourceNode && dragLine) {
                    dragLine.remove();
                    const tempStart = cy.getElementById('temp-start-node');
                    const tempTarget = cy.getElementById('temp-target-node');
                    if (tempStart.length > 0) tempStart.remove();
                    if (tempTarget.length > 0) tempTarget.remove();
                    dragSourceNode = null;
                    dragLine = null;
                    isDragging = false;
                    
                    // وپ¢ه¤چèٹ‚ç‚¹و‹–و‹½
                    cy.nodes().grabify();
                    
                    // é‡چç½®و‰€وœ‰èٹ‚ç‚¹è¾¹و،?
                    cy.nodes().forEach(node => {
                        node.style('border-width', 2);
                        node.style('border-color', '#fff');
                    });
                }
            });
        }
        
        // ç§»هٹ¨èٹ‚ç‚¹هˆ°و–°çˆ¶èٹ‚ç‚?
        async function moveCellToParent(cellId, newParentId) {
            try {
                const response = await fetch(`/api/cells/${cellId}/move`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        new_parent_id: newParentId
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // هˆ·و–°ه›¾ه½¢
                    await loadGraph();
                    await loadRootCells();
                } else {
                    alert('ç§»هٹ¨ه¤±è´¥: ' + (result.message || 'وœھçں¥é”™è¯¯'));
                }
            } catch (error) {
                console.error('Error:', error);
                alert('ç§»هٹ¨ه¤±è´¥ï¼Œè¯·و£€وں¥ç½‘ç»œè؟‍وژ?);
            }
        }
        
        // هٹ è½½ه›¾ه½¢و•°وچ®
        async function loadGraph() {
            const loading = document.getElementById('loading');
            loading.style.display = 'block';
            
            try {
                const rootId = document.getElementById('rootSelect').value;
                const url = rootId 
                    ? `/api/cells/graph?root_id=${rootId}`
                    : '/api/cells/graph';
                
                const response = await fetch(url);
                const result = await response.json();
                
                if (result.success) {
                    cy.elements().remove();
                    cy.add(result.data);
                    // هگ¯ç”¨èٹ‚ç‚¹و‹–و‹½
                    cy.nodes().grabify();
                    applyLayout();
                } else {
                    alert('هٹ è½½ه¤±è´¥: ' + result.message);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('هٹ è½½ه¤±è´¥ï¼Œè¯·و£€وں¥ç½‘ç»œè؟‍وژ?);
            } finally {
                loading.style.display = 'none';
            }
        }
        
        // ه؛”ç”¨ه¸ƒه±€
        function applyLayout() {
            const layoutName = document.getElementById('layoutSelect').value;
            let layout;
            
            if (layoutName === 'tree') {
                layout = {
                    name: 'breadthfirst',
                    directed: true,
                    padding: 30,
                    spacingFactor: 1.2
                };
            } else if (layoutName === 'circle') {
                layout = {
                    name: 'circle',
                    padding: 30
                };
            } else if (layoutName === 'grid') {
                layout = {
                    name: 'grid',
                    fit: true,
                    padding: 30
                };
            }
            
            cy.layout(layout).run();
        }
        
        // هٹ è½½و ¹èٹ‚ç‚¹هˆ—è،?
        async function loadRootCells() {
            try {
                const response = await fetch('/api/cells/roots');
                const result = await response.json();
                
                if (result.success) {
                    const select = document.getElementById('rootSelect');
                    select.innerHTML = '<option value="">وک¾ç¤؛و‰€وœ‰و ¹èٹ‚ç‚¹</option>';
                    
                    result.data.forEach(cell => {
                        const option = document.createElement('option');
                        option.value = cell.id;
                        option.textContent = `${cell.title} (${Math.round(cell.progress)}%)`;
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('Error loading roots:', error);
            }
        }
        
        // وک¾ç¤؛èٹ‚ç‚¹è¯¦وƒ…
        function showNodeDetail(data) {
            const panel = document.getElementById('detailPanel');
            
            document.getElementById('detailTitle').textContent = data.label;
            
            const statusMap = {
                'todo': { text: 'ه¾…هٹ‍', class: 'status-todo' },
                'doing': { text: 'è؟›è،Œن¸?, class: 'status-doing' },
                'paused': { text: 'وڑ‚هپœ', class: 'status-paused' },
                'done': { text: 'ه·²ه®Œوˆ?, class: 'status-done' },
                'cancelled': { text: 'ه·²هڈ–و¶?, class: 'status-cancelled' }
            };
            const status = statusMap[data.status] || { text: data.status, class: '' };
            document.getElementById('detailStatus').innerHTML = 
                `<span class="status-badge ${status.class}">${status.text}</span>`;
            
            document.getElementById('detailProgress').textContent = Math.round(data.progress) + '%';
            document.getElementById('detailProgressBar').style.width = data.progress + '%';
            document.getElementById('detailWorkload').textContent = (data.workload || 0) + ' ه°ڈو—¶';
            document.getElementById('detailActualHours').textContent = (data.actual_hours || 0) + ' ه°ڈو—¶';
            
            // èژ·هڈ–ه­گن»»هٹ،و•°
            const children = cy.getElementById(data.id).outgoers('node');
            document.getElementById('detailChildrenCount').textContent = children.length;
            
            panel.classList.add('active');
        }
        
        // éڑگè—ڈèٹ‚ç‚¹è¯¦وƒ…
        function hideNodeDetail() {
            document.getElementById('detailPanel').classList.remove('active');
        }
        
        // و‰“ه¼€ç¼–è¾‘ه¯¹è¯‌و،?
        function openEditModal(data) {
            document.getElementById('editCellId').value = data.id;
            document.getElementById('editTitle').value = data.label || '';
            document.getElementById('editStatus').value = data.status || 'todo';
            document.getElementById('editWorkload').value = data.workload || 0;
            document.getElementById('editActualHours').value = data.actual_hours || 0;
            
            const modal = document.getElementById('editModal');
            modal.style.display = 'flex';
        }
        
        // ه…³é—­ç¼–è¾‘ه¯¹è¯‌و،?
        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
        }
        
        // ن؟‌ه­کç¼–è¾‘
        async function saveCellEdit() {
            const cellId = document.getElementById('editCellId').value;
            const title = document.getElementById('editTitle').value.trim();
            const status = document.getElementById('editStatus').value;
            const workload = parseFloat(document.getElementById('editWorkload').value) || 0;
            const actualHours = parseFloat(document.getElementById('editActualHours').value) || 0;
            
            if (!title) {
                alert('و ‡é¢کن¸چèƒ½ن¸؛ç©؛');
                return;
            }
            
            try {
                const response = await fetch(`/api/cells/${cellId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        title: title,
                        status: status,
                        workload: workload,
                        actual_hours: actualHours
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    closeEditModal();
                    // هˆ·و–°ه›¾ه½¢ه’Œو ¹èٹ‚ç‚¹هˆ—è،¨
                    await loadGraph();
                    await loadRootCells();
                    // ه¦‚و‍œè¯¦وƒ…é‌¢و‌؟وک¯و‰“ه¼€çڑ„ï¼Œو›´و–°ه®?
                    const panel = document.getElementById('detailPanel');
                    if (panel.classList.contains('active')) {
                        showNodeDetail(result.data);
                    }
                } else {
                    alert('ن؟‌ه­که¤±è´¥: ' + (result.message || 'وœھçں¥é”™è¯¯'));
                }
            } catch (error) {
                console.error('Error:', error);
                alert('ن؟‌ه­که¤±è´¥ï¼Œè¯·و£€وں¥ç½‘ç»œè؟‍وژ?);
            }
        }
        
        // ç‚¹ه‡»ه¯¹è¯‌و،†ه¤–éƒ¨ه…³é—?
        document.getElementById('editModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeEditModal();
            }
        });
        
        // ==================== هˆ›ه»؛èٹ‚ç‚¹هٹںèƒ½ ====================
        
        let contextMenuTarget = null; // هڈ³é”®ç‚¹ه‡»çڑ„èٹ‚ç‚?
        
        // و‰“ه¼€هˆ›ه»؛ه¯¹è¯‌و،?
        function openCreateModal(parentId = null, parentTitle = null) {
            document.getElementById('createParentId').value = parentId || '';
            document.getElementById('createTitle').value = '';
            document.getElementById('createDescription').value = '';
            document.getElementById('createWorkload').value = '0';
            
            const title = document.getElementById('createModalTitle');
            if (parentTitle) {
                title.textContent = `هœ?"${parentTitle}" ن¸‹هˆ›ه»؛ه­گن»»هٹ،`;
            } else {
                title.textContent = 'هˆ›ه»؛و ¹ن»»هٹ?;
            }
            
            document.getElementById('createModal').style.display = 'flex';
        }
        
        // ه…³é—­هˆ›ه»؛ه¯¹è¯‌و،?
        function closeCreateModal() {
            document.getElementById('createModal').style.display = 'none';
            contextMenuTarget = null;
        }
        
        // ن؟‌ه­کو–°èٹ‚ç‚?
        async function saveNewCell() {
            const parentId = document.getElementById('createParentId').value;
            const title = document.getElementById('createTitle').value.trim();
            const description = document.getElementById('createDescription').value.trim();
            const workload = parseFloat(document.getElementById('createWorkload').value) || 0;
            
            if (!title) {
                alert('و ‡é¢کن¸چèƒ½ن¸؛ç©؛');
                return;
            }
            
            try {
                const response = await fetch('/api/cells', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        title: title,
                        description: description,
                        parent_id: parentId || null,
                        workload: workload
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    closeCreateModal();
                    // هˆ·و–°ه›¾ه½¢ه’Œو ¹èٹ‚ç‚¹هˆ—è،¨
                    await loadGraph();
                    await loadRootCells();
                } else {
                    alert('هˆ›ه»؛ه¤±è´¥: ' + (result.message || 'وœھçں¥é”™è¯¯'));
                }
            } catch (error) {
                console.error('Error:', error);
                alert('هˆ›ه»؛ه¤±è´¥ï¼Œè¯·و£€وں¥ç½‘ç»œè؟‍وژ?);
            }
        }
        
        // وک¾ç¤؛هڈ³é”®èڈœهچ•
        function showContextMenu(x, y, targetNode = null) {
            const menu = document.getElementById('contextMenu');
            const addChildItem = document.getElementById('contextMenuAddChild');
            
            contextMenuTarget = targetNode;
            
            // ه¦‚و‍œوœ‰ç›®و ‡èٹ‚ç‚¹ï¼Œوک¾ç¤؛"و·»هٹ ه­گن»»هٹ?ï¼Œهگ¦هˆ™éڑگè—?
            if (targetNode) {
                addChildItem.style.display = 'block';
            } else {
                addChildItem.style.display = 'none';
            }
            
            menu.style.left = x + 'px';
            menu.style.top = y + 'px';
            menu.style.display = 'block';
        }
        
        // éڑگè—ڈهڈ³é”®èڈœهچ•
        function hideContextMenu() {
            document.getElementById('contextMenu').style.display = 'none';
            contextMenuTarget = null;
        }
        
        // هڈ³é”®èڈœهچ• - و·»هٹ ه­گن»»هٹ?
        function onContextMenuAddChild() {
            if (contextMenuTarget) {
                const data = contextMenuTarget.data();
                openCreateModal(data.id, data.label);
            }
            hideContextMenu();
        }
        
        // هڈ³é”®èڈœهچ• - هˆ›ه»؛و ¹ن»»هٹ?
        function onContextMenuCreateRoot() {
            openCreateModal(null, null);
            hideContextMenu();
        }
        
        // ç‚¹ه‡»هˆ›ه»؛ه¯¹è¯‌و،†ه¤–éƒ¨ه…³é—?
        document.getElementById('createModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeCreateModal();
            }
        });
        
        // ç‚¹ه‡»é،µé‌¢ه…¶ن»–هœ°و–¹éڑگè—ڈهڈ³é”®èڈœهچ•
        document.addEventListener('click', function(e) {
            if (!e.target.closest('#contextMenu')) {
                hideContextMenu();
            }
        });
        
        // ن؛‹ن»¶ç›‘هگ¬
        document.getElementById('rootSelect').addEventListener('change', loadGraph);
        document.getElementById('layoutSelect').addEventListener('change', applyLayout);
        
        // هˆ‌ه§‹هŒ?
        document.addEventListener('DOMContentLoaded', async () => {
            initCytoscape();
            await loadRootCells();
            await loadGraph();
        });
    </script>
